<script>

/* ========================= */
/* MYTUBE WEB3 */
/* ========================= */

let provider;
let signer;

async function connectWallet(){

const status =
document.getElementById(
"statusText"
);

try{

status.innerText =
"⏳ Connecting Wallet...";

if(typeof window.ethereum ===
"undefined"){

status.innerText =
"❌ Trust Wallet Not Found";

return;

}

await window.ethereum.request({

method:
"eth_requestAccounts"

});

provider =
new ethers.providers.Web3Provider(
window.ethereum
);

signer =
provider.getSigner();

const address =
await signer.getAddress();

document.getElementById(
"walletAddress"
).innerText =
address;

const balanceWei =
await provider.getBalance(
address
);

const balance =
ethers.utils.formatEther(
balanceWei
);

document.getElementById(
"bnbBalance"
).innerText =
parseFloat(balance).toFixed(4)
+ " BNB";

document.getElementById(
"bnbToken"
).innerText =
parseFloat(balance).toFixed(4);

status.innerText =
"✅ Wallet Connected";

console.log(address);

}
catch(err){

console.log(err);

status.innerText =
"❌ " + err.message;

}

}
