<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MyTube Web3 Wallet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>

/* ========================= */
/* MYTUBE WEB3 😭🔥 */
/* ========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(
180deg,
#050505,
#111
);

color:white;
padding:20px;
padding-bottom:120px;

}

/* HEADER */

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;

}

.logo{

font-size:30px;
font-weight:700;

}

.logo span{
color:#ff0033;
}

.connect-btn{

padding:14px 20px;
border:none;
border-radius:18px;

background:
linear-gradient(
135deg,
#ff0033,
#ff6600
);

color:white;
font-weight:700;

}

/* WALLET CARD */

.wallet-card{

background:
linear-gradient(
135deg,
#6a00ff,
#00bfff
);

padding:28px;
border-radius:30px;
margin-bottom:22px;

box-shadow:
0 0 40px rgba(0,191,255,0.25);

}

.wallet-title{

font-size:14px;
opacity:0.8;
margin-bottom:10px;

}

.wallet-balance{

font-size:42px;
font-weight:700;
margin-bottom:10px;

}

.wallet-address{

font-size:13px;
opacity:0.8;
word-break:break-all;

}

/* TOKEN */

.token-card{

background:
rgba(255,255,255,0.05);

border:
1px solid rgba(255,255,255,0.08);

padding:20px;
border-radius:24px;
margin-bottom:16px;

display:flex;
justify-content:space-between;
align-items:center;

backdrop-filter:blur(15px);

}

.token-left{

display:flex;
align-items:center;
gap:14px;

}

.token-icon{

width:48px;
height:48px;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;

}

.bnb{
background:#f3ba2f;
color:black;
}

.myt{
background:#ff0033;
}

/* SEND */

.section-title{

font-size:22px;
font-weight:700;
margin:30px 0 18px;

}

.send-box{

background:
rgba(255,255,255,0.05);

padding:22px;
border-radius:25px;

border:
1px solid rgba(255,255,255,0.08);

}

.send-box input{

width:100%;
padding:16px;
margin-bottom:14px;

border:none;
outline:none;

border-radius:18px;

background:#181818;
color:white;

}

.send-btn{

width:100%;
padding:16px;

border:none;
border-radius:18px;

background:
linear-gradient(
135deg,
#00ff88,
#00ccff
);

font-weight:700;
font-size:16px;

}

/* STATUS */

.status{

margin-top:15px;
font-size:14px;
color:#00ff88;

}

/* NAV */

.bottom-nav{

position:fixed;
bottom:0;
left:0;

width:100%;

background:
rgba(0,0,0,0.95);

display:flex;
justify-content:space-around;

padding:15px 0;

border-top:
1px solid rgba(255,255,255,0.05);

backdrop-filter:blur(15px);

}

.nav-btn{

display:flex;
flex-direction:column;
align-items:center;
gap:5px;

font-size:13px;

}

.nav-icon{
font-size:24px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logo">
My<span>Tube</span> Web3
</div>

<button
class="connect-btn"
onclick="connectWallet()">

Connect Wallet

</button>

</div>

<!-- WALLET -->

<div class="wallet-card">

<div class="wallet-title">
Wallet Balance
</div>

<div class="wallet-balance"
id="bnbBalance">

0 BNB

</div>

<div class="wallet-address"
id="walletAddress">

Wallet not connected

</div>

</div>

<!-- TOKENS -->

<div class="token-card">

<div class="token-left">

<div class="token-icon bnb">
🟡
</div>

<div>

<div>
BNB
</div>

<div style="font-size:13px;color:#aaa;">
BNB Smart Chain
</div>

</div>

</div>

<div id="bnbToken">
0
</div>

</div>

<div class="token-card">

<div class="token-left">

<div class="token-icon myt">
🔥
</div>

<div>

<div>
MYT Coin
</div>

<div style="font-size:13px;color:#aaa;">
MyTube Token
</div>

</div>

</div>

<div>
25,000
</div>

</div>

<!-- SEND -->

<div class="section-title">
Send BNB
</div>

<div class="send-box">

<input
type="text"
id="sendAddress"
placeholder="Wallet address">

<input
type="number"
id="sendAmount"
placeholder="Amount BNB">

<button
class="send-btn"
onclick="sendBNB()">

Send Crypto

</button>

<div class="status"
id="statusText">

</div>

</div>

<!-- NAV -->

<div class="bottom-nav">

<div class="nav-btn">

<div class="nav-icon">
🏠
</div>

<div>
Home
</div>

</div>

<div class="nav-btn">

<div class="nav-icon">
🎬
</div>

<div>
Shorts
</div>

</div>

<div class="nav-btn">

<div class="nav-icon">
💰
</div>

<div>
Wallet
</div>

</div>

<div class="nav-btn">

<div class="nav-icon">
👤
</div>

<div>
Profile
</div>

</div>

</div>

<script>

/* ========================= */
/* WEB3 😭🔥 */
/* ========================= */

let provider;
let signer;
let walletAddress;

/* ========================= */
/* CONNECT WALLET */
/* ========================= */

async function connectWallet(){

if(window.ethereum){

try{

provider =
new ethers.providers.Web3Provider(
window.ethereum
);

await provider.send(
"eth_requestAccounts",
[]
);

signer = provider.getSigner();

walletAddress =
await signer.getAddress();

document.getElementById(
"walletAddress"
).innerText = walletAddress;

loadBalance();

}
catch(err){

alert("Connection Failed 😭");

}

}else{

alert(
"Install MetaMask / Trust Wallet 😭🔥"
);

}

}

/* ========================= */
/* LOAD BALANCE */
/* ========================= */

async function loadBalance(){

const balance =
await provider.getBalance(
walletAddress
);

const bnb =
ethers.utils.formatEther(balance);

document.getElementById(
"bnbBalance"
).innerText =
parseFloat(bnb).toFixed(4)
+ " BNB";

document.getElementById(
"bnbToken"
).innerText =
parseFloat(bnb).toFixed(4);

}

/* ========================= */
/* SEND BNB */
/* ========================= */

async function sendBNB(){

const to =
document.getElementById(
"sendAddress"
).value;

const amount =
document.getElementById(
"sendAmount"
).value;

if(!to || !amount){

alert("Fill all fields 😭");

return;

}

try{

document.getElementById(
"statusText"
).innerText =
"⏳ Sending...";

const tx =
await signer.sendTransaction({

to: to,

value:
ethers.utils.parseEther(amount)

});

await tx.wait();

document.getElementById(
"statusText"
).innerText =
"✅ Success TX: "
+ tx.hash;

loadBalance();

}
catch(err){

document.getElementById(
"statusText"
).innerText =
"❌ Failed";

console.log(err);

}

}

</script>

</body>
</html>
