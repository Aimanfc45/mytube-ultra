<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTube</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
    }
    .logo span { color: red; }
    .wallet-card {
      margin: 16px;
      padding: 20px;
      border-radius: 16px;
      background: linear-gradient(135deg, #6e8efb, #a777e3);
    }
    .wallet-card button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #ff3b30;
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    .error {
      color: #ff3b30;
      margin-top: 8px;
    }
    .success {
      color: #4caf50;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">My<span>Tube</span></div>
  </header>

  <div class="wallet-card">
    <div>Wallet Balance</div>
    <h1 id="balance">0 BNB</h1>
    <div id="walletStatus">Wallet not connected</div>
    <button id="connectBtn">Connect Wallet</button>
    <div id="statusMsg" class="error"></div>
  </div>

  <!-- Ethers.js v5 CDN - ni yang penting -->
  <script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js" 
          type="application/javascript"></script>

  <script>
    const connectBtn = document.getElementById("connectBtn");
    const balanceEl = document.getElementById("balance");
    const walletStatus = document.getElementById("walletStatus");
    const statusMsg = document.getElementById("statusMsg");

    let provider, signer, userAddress;

    // Check kalau ethers dah load
    window.addEventListener('load', () => {
      if (typeof ethers === 'undefined') {
        statusMsg.textContent = "Ethers.js Not Loaded";
        statusMsg.className = "error";
      } else {
        statusMsg.textContent = "Ethers.js Loaded ✓";
        statusMsg.className = "success";
      }
    });

    connectBtn.addEventListener("click", async () => {
      if (typeof window.ethereum === 'undefined') {
        statusMsg.textContent = "Install MetaMask dulu";
        statusMsg.className = "error";
        return;
      }

      try {
        statusMsg.textContent = "Connecting...";
        statusMsg.className = "";

        // Request account access
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();

        walletStatus.textContent = `Connected: ${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
        
        // Get BNB balance
        const balance = await provider.getBalance(userAddress);
        const balanceInBNB = ethers.utils.formatEther(balance);
        balanceEl.textContent = `${parseFloat(balanceInBNB).toFixed(4)} BNB`;

        statusMsg.textContent = "Wallet connected!";
        statusMsg.className = "success";

      } catch (err) {
        console.error(err);
        statusMsg.textContent = "Connection failed: " + err.message;
        statusMsg.className = "error";
      }
    });
  </script>
</body>
</html>
