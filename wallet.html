<script>

/* ========================= */
/* WEB3 REAL 😭🔥 */
/* ========================= */

let provider;
let signer;
let walletAddress;

async function connectWallet(){

const status =
document.getElementById(
"statusText"
);

if(typeof window.ethereum !==
"undefined"){

try{

status.innerText =
"⏳ Connecting Wallet...";

provider =
new ethers.providers.Web3Provider(
window.ethereum
);

await provider.send(
"eth_requestAccounts",
[]
);

signer =
provider.getSigner();

walletAddress =
await signer.getAddress();

document.getElementById(
"walletAddress"
).innerText =
walletAddress;

const balance =
await provider.getBalance(
walletAddress
);

const bnb =
ethers.utils.formatEther(
balance
);

document.getElementById(
"bnbBalance"
).innerText =
parseFloat(bnb).toFixed(4)
+ " BNB";

status.innerText =
"✅ Wallet Connected";

}
catch(error){

console.log(error);

status.innerText =
"❌ Connection Cancelled";

}

}else{

status.innerText =
"⚠️ Open using Trust Wallet Browser";

}

}
